workflows:
  android-release:
    name: The Fragrance App - Android Build
    max_build_duration: 60
    environment:
      java: 21
      node: 22
      groups:
        - default
    scripts:
      - name: Install Node dependencies
        script: npm install
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Fix local.properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
      - name: Set gradlew permissions
        script: chmod +x android/gradlew
      - name: Decode keystore
        script: |
          python3 -c "import base64, os; open('/tmp/release.keystore', 'wb').write(base64.b64decode(os.environ['CM_KEYSTORE']+ '=='))"
      - name: Build signed release AAB
        script: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/release.keystore \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD \
            --no-daemon
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
