workflows:
  android-release:
    name: The Fragrance App - Android Build
    max_build_duration: 60
    environment:
      java: 17
      node: 20
    scripts:
      - name: Install Node dependencies
        script: npm install
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Set gradlew permissions
        script: chmod +x android/gradlew
      - name: Build Android App Bundle
        script: |
          cd android
          ./gradlew bundleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/bundle/debug/*.aab
      - android/app/build/outputs/apk/debug/*.apk
